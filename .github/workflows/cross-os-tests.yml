name: Cross-OS Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }} / ${{ matrix.launcher || 'windows-default' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            launcher: sh
          - os: ubuntu-latest
            launcher: bash
          - os: ubuntu-latest
            launcher: zsh
          - os: ubuntu-latest
            launcher: fish
          - os: ubuntu-latest
            launcher: tcsh
          - os: macos-latest
            launcher: sh
          - os: macos-latest
            launcher: bash
          - os: macos-latest
            launcher: zsh
          - os: macos-latest
            launcher: fish
          - os: macos-latest
            launcher: tcsh
          - os: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux shells
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh fish tcsh

      - name: Install macOS shells
        if: runner.os == 'macOS'
        run: brew install fish

      - name: Run contract tests (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: sh ./test.cmd -OutputPath artifacts/test-output.txt -LauncherShell "${{ matrix.launcher }}"

      - name: Run contract tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./test.cmd -OutputPath artifacts/test-output.txt

      - name: Upload normalized transcript
        uses: actions/upload-artifact@v7
        with:
          name: test-output-${{ matrix.os }}-${{ matrix.launcher || 'windows-default' }}
          path: artifacts/test-output.txt
          if-no-files-found: error

  compare:
    name: Compare outputs
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Download transcripts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/outputs

      - name: Require identical outputs
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find artifacts/outputs -type f -name test-output.txt | sort)
          if [ "${#files[@]}" -lt 2 ]; then
            echo "need at least two test-output.txt artifacts to compare" >&2
            exit 1
          fi
          ref="$(mktemp)"
          tr -d '\r' < "${files[0]}" > "$ref"
          for candidate in "${files[@]:1}"; do
            normalized_candidate="$(mktemp)"
            tr -d '\r' < "$candidate" > "$normalized_candidate"
            cmp -s "$ref" "$normalized_candidate" || {
              echo "artifact mismatch: ${files[0]} vs $candidate" >&2
              exit 1
            }
            rm -f "$normalized_candidate"
          done
          rm -f "$ref"
          echo "validated identical outputs across ${#files[@]} OS artifacts"
