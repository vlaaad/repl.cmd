name: Cross-OS Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }} / ${{ matrix.launcher || 'windows-default' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            launcher: sh
          - os: ubuntu-latest
            launcher: bash
          - os: ubuntu-latest
            launcher: zsh
          - os: ubuntu-latest
            launcher: fish
          - os: ubuntu-latest
            launcher: tcsh
          - os: macos-latest
            launcher: sh
          - os: macos-latest
            launcher: bash
          - os: macos-latest
            launcher: zsh
          - os: macos-latest
            launcher: fish
          - os: macos-latest
            launcher: tcsh
          - os: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Linux shells
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh fish tcsh

      - name: Install macOS shells
        if: runner.os == 'macOS'
        run: brew install fish

      - name: Run contract tests (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: python ./test.py run --output-path artifacts/test-output.txt --launcher-shell "${{ matrix.launcher }}"

      - name: Run contract tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python ./test.py run --output-path artifacts/test-output.txt

      - name: Upload normalized transcript
        uses: actions/upload-artifact@v7
        with:
          name: test-output-${{ matrix.os }}-${{ matrix.launcher || 'windows-default' }}
          path: artifacts/test-output.txt
          if-no-files-found: error

  compare:
    name: Compare outputs
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Download transcripts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/outputs

      - name: Require identical outputs
        run: python ./test.py compare --artifacts-root artifacts/outputs
